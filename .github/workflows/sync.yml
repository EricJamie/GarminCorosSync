name: Garmin ⇄ Coros Sync

on:
  # Run daily at 07:30 UTC (15:30 Beijing time)
  schedule:
    - cron: '30 7 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      direction:
        description: 'Sync direction'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - garmin_only
          - coros_only
      since:
        description: 'Only sync activities on or after this date (YYYYMMDD or YYYY-MM-DD)'
        required: false
        default: ''
        type: string
      window_mode:
        description: 'How to choose records after date filtering'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - newest
          - earliest
      window_size:
        description: 'Window size used when window_mode is newest or earliest'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (no actual upload)'
        required: false
        default: 'false'
        type: boolean

# Only allow one concurrent sync, cancel in-progress runs
concurrency:
  group: sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt

      - name: Run sync
        env:
          COROS_EMAIL: ${{ secrets.COROS_EMAIL }}
          COROS_PASSWORD: ${{ secrets.COROS_PASSWORD }}
          GARMIN_TOKEN_DATA: ${{ secrets.GARMIN_TOKEN_DATA }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          INPUT_DIRECTION: ${{ inputs.direction }}
          INPUT_SINCE: ${{ inputs.since }}
          INPUT_WINDOW_MODE: ${{ inputs.window_mode }}
          INPUT_WINDOW_SIZE: ${{ inputs.window_size }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -eu

          DIRECTION="${INPUT_DIRECTION:-both}"
          SINCE="${INPUT_SINCE:-}"
          WINDOW_MODE="${INPUT_WINDOW_MODE:-default}"
          WINDOW_SIZE="${INPUT_WINDOW_SIZE:-}"
          DRY_RUN="${INPUT_DRY_RUN:-false}"

          ARGS=(--coros-email "$COROS_EMAIL" --coros-password "$COROS_PASSWORD")

          if [ "$DIRECTION" = "garmin_only" ]; then
            ARGS+=(--garmin-only)
          elif [ "$DIRECTION" = "coros_only" ]; then
            ARGS+=(--coros-only)
          fi

          if [ -n "$SINCE" ]; then
            ARGS+=(--since "$SINCE")
          fi

          if [ "$WINDOW_MODE" = "newest" ] && [ -n "$WINDOW_SIZE" ]; then
            ARGS+=(--newest "$WINDOW_SIZE")
          elif [ "$WINDOW_MODE" = "earliest" ] && [ -n "$WINDOW_SIZE" ]; then
            ARGS+=(--earliest "$WINDOW_SIZE")
          fi

          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          echo "Running: python sync.py ${ARGS[*]}"
          python sync.py "${ARGS[@]}"
